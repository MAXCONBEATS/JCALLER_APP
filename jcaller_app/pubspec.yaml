name: jcaller_app
description: Client app for JCaller – VoIP calls in local network
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # WebRTC

  # Networking
  http: ^1.2.2
  web_socket_channel: 3.0.3

  # State management
  riverpod: ^2.6.1
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Permissions (cross‑platform)
  permission_handler: ^11.3.1

  # Local storage (tokens, settings)
  shared_preferences: ^2.3.2

  # UUID for generating unique IDs (if needed)
  uuid: ^4.5.1
  flutter_webrtc: ^1.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1

flutter:
  uses-material-design: true
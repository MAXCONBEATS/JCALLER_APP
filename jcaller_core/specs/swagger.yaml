openapi: 3.0.0
info:
  title: JCaller API
  description: API для сервера звонков JCaller (пользователи + сигналинг)
  version: 1.0.0
servers:
  - url: http://localhost:8081
    description: User API (регистрация, логин, пользователи)
  - url: http://localhost:8080
    description: Call signaling API (запросы на звонок, сессии)
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
  - bearerAuth: []
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
  /api/auth/register:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  minLength: 3
                password:
                  type: string
                  minLength: 6
      responses:
        '200':
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  username:
                    type: string
                  createdAt:
                    type: string
                    format: date-time
        '400':
          description: Validation error
  /api/auth/login:
    post:
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Returns user info and JWT token
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                      username:
                        type: string
                      createdAt:
                        type: string
                  token:
                    type: string
        '401':
          description: Invalid credentials
  /api/users:
    get:
      summary: Get all users
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    username:
                      type: string
                    createdAt:
                      type: string
  /api/users/{id}:
    get:
      summary: Get user by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User object
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  username:
                    type: string
                  createdAt:
                    type: string
        '404':
          description: User not found
  /api/calls/request:
    post:
      summary: Create a call request
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - senderId
                - recipientId
              properties:
                senderId:
                  type: string
                recipientId:
                  type: string
      responses:
        '200':
          description: Call request created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  senderId:
                    type: string
                  recipientId:
                    type: string
                  status:
                    type: string
                  createdAt:
                    type: string
        '400':
          description: Bad request
  /api/calls/requests/{userId}:
    get:
      summary: Get pending call requests for a user
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of pending call requests
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    senderId:
                      type: string
                    recipientId:
                      type: string
                    status:
                      type: string
                    createdAt:
                      type: string
  /api/calls/accept/{requestId}:
    post:
      summary: Accept a call request
      security:
        - bearerAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Call session started
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  callerId:
                    type: string
                  recipientId:
                    type: string
                  startTime:
                    type: string
                  status:
                    type: string
        '404':
          description: Request not found
  /api/calls/reject/{requestId}:
    post:
      summary: Reject a call request
      security:
        - bearerAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Request rejected
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '404':
          description: Request not found
  /api/calls/end/{sessionId}:
    post:
      summary: End an active call
      security:
        - bearerAuth: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Call ended
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  endTime:
                    type: string
                  durationSeconds:
                    type: integer
        '404':
          description: Session not found